name: Test Runner

on:
  workflow_dispatch:  # ti permette di lanciarlo a mano da GitHub

jobs:
  run-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt || true
          pip install PyGithub || true

      - name: Run FAST test
        run: |
          python src/3appdays_runner.py --fast

      - name: Run NIGHT test
        run: |
          python src/3appdays_runner.py --night
