name: ArabSniper Night Scan

on:
  workflow_dispatch:
  schedule:
    - cron: "12 3 * * *"
      timezone: "Europe/Rome"

permissions:
  contents: write

concurrency:
  group: arabsniper-night-scan
  cancel-in-progress: false

jobs:
  night-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      API_SPORTS_KEY: ${{ secrets.API_SPORTS_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt || true
          pip install streamlit requests pandas PyGithub || true

      - name: Run night workflow
        run: python src/3appdays_runner.py --night
